# Truthwatcher sample configuration
api:
  listen_address: ":8080"

auth:
  mode: "jwt"
  local_dev_bypass: true
  bypass_subject: "local-dev"
  bypass_roles:
    - "admin"
  jwt:
    issuer: "https://issuer.example.com"
    audience: "truthwatcher-api"

intent:
  source: "git"
  repo: "https://example.com/network-intent.git"

deployment:
  strategy: "phased"
  phase_delay: "30s"

observability:
  drift_scan_interval: "5m"

# TODO: Add vendor adapters and per-platform credentials.
