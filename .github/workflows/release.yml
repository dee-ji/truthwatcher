name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true
      - name: Validate semantic version tag
        shell: bash
        run: |
          set -euo pipefail
          if [[ ! "${GITHUB_REF_NAME}" =~ ^v[0-9]+\.[0-9]+\.[0-9]+(-(alpha|beta|rc)\.[0-9]+)?$ ]]; then
            echo "Tag ${GITHUB_REF_NAME} is not a supported semantic version tag."
            exit 1
          fi
      - name: Detect release type
        id: release_type
        shell: bash
        run: |
          set -euo pipefail
          prerelease=false
          if [[ "${GITHUB_REF_NAME}" == *-alpha* || "${GITHUB_REF_NAME}" == *-beta* || "${GITHUB_REF_NAME}" == *-rc* ]]; then
            prerelease=true
          fi
          echo "prerelease=${prerelease}" >> "$GITHUB_OUTPUT"
      - name: Build release artifacts
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p dist
          VERSION="${GITHUB_REF_NAME}"
          COMMIT="${GITHUB_SHA}"
          BUILD_DATE="$(date -u +'%Y-%m-%dT%H:%M:%SZ')"
          LDFLAGS="-s -w -X 'truthwatcher/internal/version.Version=${VERSION}' -X 'truthwatcher/internal/version.Commit=${COMMIT}' -X 'truthwatcher/internal/version.BuildDate=${BUILD_DATE}'"
          for target in linux/amd64 linux/arm64 darwin/amd64 darwin/arm64 windows/amd64; do
            goos="${target%/*}"
            goarch="${target#*/}"
            name="truthwatcher-${VERSION}-${goos}-${goarch}"
            ext=""
            if [ "$goos" = "windows" ]; then ext=".exe"; fi
            mkdir -p "dist/${name}"
            CGO_ENABLED=0 GOOS="$goos" GOARCH="$goarch" go build -trimpath -ldflags "$LDFLAGS" -o "dist/${name}/truthwatcher${ext}" ./cmd/truthwatcher
            cp LICENSE README.md docs/install.md docs/RELEASES.md "dist/${name}/"
            tar -czf "dist/${name}.tar.gz" -C dist "${name}"
          done
      - name: Generate checksums
        run: |
          cd dist
          sha256sum *.tar.gz > SHA256SUMS.txt
      - name: Generate changelog
        shell: bash
        run: |
          set -euo pipefail
          previous_tag="$(git describe --tags --abbrev=0 "${GITHUB_REF_NAME}^" 2>/dev/null || true)"
          {
            echo "# Changelog for ${GITHUB_REF_NAME}"
            echo
            if [ -n "$previous_tag" ]; then
              git log --pretty='- %s (%h)' "${previous_tag}..${GITHUB_REF_NAME}"
            else
              git log --pretty='- %s (%h)' "${GITHUB_REF_NAME}"
            fi
          } > dist/CHANGELOG.md
      - uses: softprops/action-gh-release@v2
        with:
          prerelease: ${{ steps.release_type.outputs.prerelease }}
          body_path: dist/CHANGELOG.md
          files: |
            dist/*.tar.gz
            dist/SHA256SUMS.txt
