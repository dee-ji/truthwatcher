name: Build

on:
  pull_request:
  push:
    branches: [main]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true
      - run: make build
      - uses: actions/upload-artifact@v4
        with:
          name: truthwatcher-linux-amd64
          path: bin/truthwatcher
