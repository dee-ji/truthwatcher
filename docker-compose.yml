version: '3.9'
services:
  postgres:
    image: postgres:16
    environment:
      POSTGRES_USER: truthwatcher
      POSTGRES_PASSWORD: truthwatcher
      POSTGRES_DB: truthwatcher
    ports: ["5432:5432"]
    healthcheck: {test: ["CMD-SHELL", "pg_isready -U truthwatcher"], interval: 5s, timeout: 5s, retries: 10}

  redis:
    image: redis:7
    ports: ["6379:6379"]

  api:
    build:
      context: .
      dockerfile: deployments/docker/spanreed/Dockerfile
    environment:
      DATABASE_URL: postgres://truthwatcher:truthwatcher@postgres:5432/truthwatcher?sslmode=disable
      REDIS_ADDR: redis:6379
      API_ADDR: :8080
    ports: ["8080:8080"]
    depends_on: [postgres, redis]

  worker:
    build:
      context: .
      dockerfile: deployments/docker/squire/Dockerfile
    environment:
      DATABASE_URL: postgres://truthwatcher:truthwatcher@postgres:5432/truthwatcher?sslmode=disable
      REDIS_ADDR: redis:6379
    depends_on: [postgres, redis]
