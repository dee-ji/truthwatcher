version: '3.9'
services:
  postgres:
    image: postgres:16
    environment:
      POSTGRES_USER: truthwatcher
      POSTGRES_PASSWORD: truthwatcher
      POSTGRES_DB: truthwatcher
    ports: ["5432:5432"]
    healthcheck: {test: ["CMD-SHELL", "pg_isready -U truthwatcher"], interval: 5s, timeout: 5s, retries: 10}
  redis:
    image: redis:7
    ports: ["6379:6379"]
  api:
    build:
      context: .
      dockerfile: deployments/docker/radiant/Dockerfile
    command: ["/app/tw-server"]
    ports: ["8080:8080"]
    depends_on: [postgres, redis]
  worker:
    build:
      context: .
      dockerfile: deployments/docker/stormlight/Dockerfile
    command: ["/app/tw-worker"]
    depends_on: [postgres, redis]
