apiVersion: apps/v1
kind: Deployment
metadata: {name: {{ include "truthwatcher.fullname" . }}-spanreed}
spec:
  replicas: 1
  selector: {matchLabels: {app: spanreed}}
  template:
    metadata: {labels: {app: spanreed}}
    spec:
      containers:
      - name: spanreed
        image: {{ .Values.spanreed.image }}
---
apiVersion: apps/v1
kind: Deployment
metadata: {name: {{ include "truthwatcher.fullname" . }}-squire}
spec:
  replicas: 1
  selector: {matchLabels: {app: squire}}
  template:
    metadata: {labels: {app: squire}}
    spec:
      containers:
      - name: squire
        image: {{ .Values.squire.image }}
