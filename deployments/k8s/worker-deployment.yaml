apiVersion: apps/v1
kind: Deployment
metadata: {name: truthwatcher-squire}
spec:
  replicas: 1
  selector: {matchLabels: {app: truthwatcher-squire}}
  template:
    metadata: {labels: {app: truthwatcher-squire}}
    spec:
      containers:
        - name: squire
          image: truthwatcher/squire:latest
