apiVersion: apps/v1
kind: Deployment
metadata: {name: truthwatcher-spanreed}
spec:
  replicas: 1
  selector: {matchLabels: {app: truthwatcher-spanreed}}
  template:
    metadata: {labels: {app: truthwatcher-spanreed}}
    spec:
      containers:
        - name: spanreed
          image: truthwatcher/spanreed:latest
          ports: [{containerPort: 8080}]
---
apiVersion: v1
kind: Service
metadata: {name: truthwatcher-spanreed}
spec:
  selector: {app: truthwatcher-spanreed}
  ports: [{port: 80, targetPort: 8080}]
